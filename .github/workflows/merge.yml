name: Absorb merged PR artifacts into main

on:
  pull_request_target:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      head_sha:
        description: PR head SHA to promote artifacts for
        required: true
        type: string

permissions:
  contents: read
  actions: read

jobs:
  plan:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      count: ${{ steps.plan.outputs.count }}
      head_sha: ${{ steps.meta.outputs.head_sha }}

    steps:
      - id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "head_sha=${{ inputs.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "head_sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - id: plan
        uses: actions/github-script@v7
        env:
          HEAD_SHA: ${{ steps.meta.outputs.head_sha }}
        with:
          script: |
            const headSha = process.env.HEAD_SHA;
            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100
              }
            );

            const prefix = `pr-${headSha}-`;
            const include = [];

            for (const a of artifacts) {
              if (!a.name.startsWith(prefix) || a.expired) continue;
              const rest = a.name.slice(prefix.length);
              const i = rest.indexOf("-");
              if (i === -1) continue;
              include.push({
                dependency: rest.slice(0, i),
                platform: rest.slice(i + 1)
              });
            }

            const seen = new Set();
            const unique = include.filter(x => {
              const k = `${x.dependency}/${x.platform}`;
              if (seen.has(k)) return false;
              seen.add(k);
              return true;
            });

            core.setOutput("matrix", JSON.stringify({ include: unique }));
            core.setOutput("count", String(unique.length));

  promote:
    needs: plan
    if: ${{ needs.plan.outputs.count != '0' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    runs-on: ubuntu-latest

    steps:
      - name: Download PR artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build.yml
          commit: ${{ needs.plan.outputs.head_sha }}
          name: pr-${{ needs.plan.outputs.head_sha }}-${{ matrix.dependency }}-${{ matrix.platform }}
          path: dist
          if_no_artifact_found: fail

      - name: Upload main artifact
        uses: actions/upload-artifact@v4
        with:
          name: main-${{ matrix.dependency }}-${{ matrix.platform }}
          path: dist/*
          retention-days: 90
