name: Build

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  plan:
    name: Plan changed targets
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      count: ${{ steps.plan.outputs.count }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: plan
        shell: bash
        run: |
          set -euo pipefail

          # Discover all build scripts from repo layout.
          all_scripts=$(find deps -mindepth 2 -maxdepth 2 -type f -name '*.sh' | sort)

          # PRs: only changed build scripts.
          # Manual: build everything.
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            wanted=$(git diff --name-only "$base" "$head" -- 'deps/*/*.sh' | sort || true)
          else
            wanted="$all_scripts"
          fi

          rows=()

          while IFS= read -r script; do
            [[ -n "$script" ]] || continue

            dep=$(cut -d/ -f2 <<<"$script")
            platform=$(basename "$script" .sh)

            # Only hardcoded bit: platform -> runner
            case "$platform" in
              manylinux_2_28_x86_64) runs_on="ubuntu-latest" ;;
              manylinux_2_28_aarch64) runs_on="ubuntu-24.04-arm" ;;
              macosx_15_0_aarch64)    runs_on="macos-15" ;;
              macosx_15_0_x86_64)     runs_on="macos-15-intel" ;;
              win_amd64)              runs_on="windows-latest" ;;
              *) echo "Unknown platform: $platform" >&2; exit 1 ;;
            esac

            rows+=("{\"dependency\":\"$dep\",\"platform\":\"$platform\",\"runs_on\":\"$runs_on\"}")
          done <<< "$wanted"

          if [[ ${#rows[@]} -eq 0 ]]; then
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            echo 'count=0' >> "$GITHUB_OUTPUT"
          else
            matrix=$(printf '%s\n' "${rows[@]}" | sort -u | jq -sc '{include: .}')
            count=$(printf '%s\n' "${rows[@]}" | sort -u | wc -l | tr -d ' ')
            echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
            echo "count=$count" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.dependency }} for ${{ matrix.platform }}
    needs: plan
    if: ${{ needs.plan.outputs.count != '0' }}
    runs-on: ${{ matrix.runs_on }}

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      # Cache key is per target and per script content.
      # Changing tket/windows does not invalidate llvm/macos.
      - name: Restore cached build
        id: cache
        uses: actions/cache@v4
        with:
          path: hugrenv-${{ matrix.dependency }}-${{ matrix.platform }}.tar.gz
          key: ${{ matrix.dependency }}-${{ matrix.platform }}-${{ hashFiles(format('deps/{0}/{1}.sh', matrix.dependency, matrix.platform)) }}

      - name: Setup MSVC
        if: ${{ startsWith(matrix.platform, 'win_') }}
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build inside container
        if: ${{ startsWith(matrix.platform, 'manylinux_') && steps.cache.outputs.cache-hit != 'true' }}
        shell: bash
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/host" \
            quay.io/pypa/${{ matrix.platform }} \
            bash /host/deps/${{ matrix.dependency }}/${{ matrix.platform }}.sh \
                 '/host/hugrenv-${{ matrix.dependency }}-${{ matrix.platform }}.tar.gz'

      - name: Build natively
        if: ${{ !startsWith(matrix.platform, 'manylinux_') && steps.cache.outputs.cache-hit != 'true' }}
        shell: bash
        run: |
          bash \
            deps/${{ matrix.dependency }}/${{ matrix.platform }}.sh \
            '${{ github.workspace }}/hugrenv-${{ matrix.dependency }}-${{ matrix.platform }}.tar.gz'

      # Upload whether it came from cache or a fresh build.
      - name: Upload PR artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ github.event.pull_request.head.sha }}-${{ matrix.dependency }}-${{ matrix.platform }}
          path: hugrenv-${{ matrix.dependency }}-${{ matrix.platform }}.tar.gz
          retention-days: 30
