name: Install hugrenv packages from hugrenv.lock
description: Reads the local hugrenv.lock to determine the version, downloads and installs the requested hugrenv packages for the current platform, and sets environment variables for subsequent steps

inputs:
  packages:
    description: "Comma-separated list of packages to install (default: llvm,tket)"
    required: false
    default: "llvm,tket"
  lockfile:
    description: "Relative path to the hugrenv.lock file (default: hugrenv.lock)"
    required: false
    default: "hugrenv.lock"

runs:
  using: composite
  steps:
    - name: Get version from ${{ inputs.lockfile }}
      shell: bash
      id: version
      run: |
        lockfile_path="${GITHUB_WORKSPACE}/${{ inputs.lockfile }}";
        if [[ ! -f "$lockfile_path" ]]; then
          echo "Error: Lockfile not found at $lockfile_path";
          exit 1;
        fi;
        version=$(jq -r '.version' "${lockfile_path}");
        echo "HUGRENV_VERSION=$version" >> $GITHUB_ENV;
    - name: Get target platform
      shell: bash
      id: install_path
      run: |
        # Identify the system (left columns) to figure out the target and path
        # +------------------------++------------------------+-----------------+
        # | host os | architecture || target                 | extraction path |
        # +------------------------++------------------------+-----------------+
        # | linux   | x86_64       || manylinux_2_28_x86_64  | /tmp/hugrverse  |
        # | linux   | aarch64      || manylinux_2_28_aarch64 | /tmp/hugrverse  |
        # | macos   | x86_64       || macosx_11_0_x86_64     | /tmp/hugrverse  |
        # | macos   | aarch64      || macosx_11_0_aarch64    | /tmp/hugrverse  |
        # | windows | x86_64       || win_amd64              | C:\hugrverse    |
        # +---------+--------------++------------------------+-----------------+
        os="$(uname -s | tr '[:upper:]' '[:lower:]')";
        arch="$(uname -m)";
        case $os in
          linux)
            install_path="/tmp/hugrverse";
            if [[ "$arch" == "x86_64" ]]; then
              target="manylinux_2_28_x86_64";
            elif [[ "$arch" == "aarch64" ]]; then
              target="manylinux_2_28_aarch64";
            else
              echo "Unsupported architecture: $arch";
              exit 1;
            fi;
            ;;
          darwin)
            install_path="/tmp/hugrverse";
            if [[ "$arch" == "x86_64" ]]; then
              target="macosx_11_0_x86_64";
            elif [[ "$arch" == "arm64" ]]; then
              target="macosx_11_0_aarch64";
            else
              echo "Unsupported architecture: $arch";
              exit 1;
            fi;
            ;;
          msys*|cygwin*|mingw*|win*)
            install_path="C:\\hugrverse";
            if [[ "$arch" == "x86_64" ]]; then
              target="win_amd64";
            else
              echo "Unsupported architecture: $arch";
              exit 1;
            fi;
            ;;
          *)
            echo "Unsupported OS: $os";
            exit 1;
            ;;
        esac
        echo "HUGRENV_TARGET=${target}" >> $GITHUB_ENV;
        echo "HUGRENV_PATH=${install_path}" >> $GITHUB_ENV;

    - name: Download from hugrverse-env
      shell: bash
      run: |
        packages="${{ inputs.packages }}";
        echo "Downloading hugrenv version ${HUGRENV_VERSION} for target ${HUGRENV_TARGET} with packages $packages to ${HUGRENV_PATH}";
        mkdir -p $HUGRENV_PATH;
        for package in ${packages//,/ }; do
          echo "Downloading package $package";
          url="https://github.com/Quantinuum/hugrverse-env/releases/download/v${HUGRENV_VERSION}/hugrenv-${package}-${HUGRENV_TARGET}.tar.gz";
          curl -L "$url" | tar -xzf - -C ${HUGRENV_PATH} --strip-components=1;
        done;

    - name: Set environment variables
      shell: bash
      run: |
        echo "Setting environment variables for hugrenv";

        # if tket is in the packages, set TKET_C_API_PATH
        if [[ "${{ inputs.packages }}" == *"tket"* ]]; then
          echo "Setting TKET_C_API_PATH to ${HUGRENV_PATH}";
          echo "TKET_C_API_PATH=${HUGRENV_PATH}" >> $GITHUB_ENV;
        fi;

        # if llvm is in the packages, set LLVM_SYS_211_PREFIX and LIBCLANG_PATH
        if [[ "${{ inputs.packages }}" == *"llvm"* ]]; then
          echo "Setting LLVM_SYS_211_PREFIX to ${HUGRENV_PATH}";
          echo "LLVM_SYS_211_PREFIX=${HUGRENV_PATH}" >> $GITHUB_ENV;
          echo "Setting LIBCLANG_PATH to ${HUGRENV_PATH}/lib";
          echo "LIBCLANG_PATH=${HUGRENV_PATH}/lib" >> $GITHUB_ENV;
        fi;
        # set library env vars
        case $HUGRENV_TARGET in
          manylinux*)
            echo "Setting LD_LIBRARY_PATH to include ${HUGRENV_PATH}/lib and ${HUGRENV_PATH}/lib64";
            echo "LD_LIBRARY_PATH=${HUGRENV_PATH}/lib:${HUGRENV_PATH}/lib64:${LD_LIBRARY_PATH}" >> $GITHUB_ENV;
            echo "Setting PATH to include ${HUGRENV_PATH}/bin";
            echo "${HUGRENV_PATH}/bin" >> $GITHUB_PATH;
            ;;
          macosx*)
            echo "Setting DYLD_LIBRARY_PATH to include ${HUGRENV_PATH}/lib and ${HUGRENV_PATH}/lib64";
            echo "DYLD_LIBRARY_PATH=${HUGRENV_PATH}/lib:${HUGRENV_PATH}/lib64:${DYLD_LIBRARY_PATH}" >> $GITHUB_ENV;
            echo "Setting PATH to include ${HUGRENV_PATH}/bin";
            echo "${HUGRENV_PATH}/bin" >> $GITHUB_PATH;
            ;;
          win*)
            echo "Setting PATH to include ${HUGRENV_PATH}/lib, ${HUGRENV_PATH}/lib64, and ${HUGRENV_PATH}/bin";
            echo "${HUGRENV_PATH}\\lib" >> $GITHUB_PATH;
            echo "${HUGRENV_PATH}\\lib64" >> $GITHUB_PATH;
            echo "${HUGRENV_PATH}\\bin" >> $GITHUB_PATH;
            ;;
        esac;

